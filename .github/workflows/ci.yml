name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest --tb=short

      - name: Check imports (no Hermes)
        run: |
          python -c "import memory_preflight; print('Import OK')"
          python -c "from memory_preflight import classify_action, score_candidate, FactMetadata, MemoryPreflightAdvisory, MemoryPreflightDecision, build_memory_preflight_advisory; print('All exports OK')"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check for Hermes imports
        run: |
          grep -r "from hermes\|import hermes\|from agent\.\|from tests\." --include="*.py" src/ tests/ && echo "FOUND_PROHIBITED_IMPORTS" && exit 1 || echo "No Hermes imports found — clean"

      - name: CLI smoke test
        run: |
          pip install -e .
          memory-preflight classify --tool terminal --args '{"command": "ls"}' | python -c "import sys, json; json.load(sys.stdin); print('CLI OK')"